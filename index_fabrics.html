<!DOCTYPE html>
<html>
<head>
    <title>Fabric.js</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
</head>
<body>
    <canvas id="canvas" width="900" height="600"></canvas>
    <button onclick = "spawnCircle()">добавить круг</button>
    <button onclick = "spawnRect()">Добавить квадрат</button>
    <button onclick = "spawnTriangle()">Добавить треугольник</button>
     <button class="colorBtn" style="background:#ff0000" data-color="#ff0000">Красный</button>
    <button class="colorBtn" style="background:#00ff00" data-color="#00ff00">Зеленый</button>
    <button class="colorBtn" style="background:#0000ff" data-color="#0000ff">Синий</button>
    <button onclick="saveMyScene()">сохранить сцену</button>
    <button onclick = "loadMyScene()">загрузить сцену</button>
    <script>
        var canvas = new fabric.Canvas('canvas', {
            backgroundColor: '#E0FFFF'
        });
 document.querySelectorAll('.colorBtn').forEach(function(btn){
            btn.onclick = function(){
                currentColor = this.getAttribute('data-color');

            }
        })


        function spawnCircle(){

            var randomLeft = 100 + Math.random() * 300;
            var randomTop = 100 + Math.random() * 300;

            var newCircle = new fabric.Circle({
                left: randomLeft,
                top: randomTop,
                radius: 70,
                fill: currentColor,
                stroke: 'black',
                strokeWidth: 2,

            })
            canvas.add(newCircle);
        }

        function spawnRect(){
            var randomLeft = 100 + Math.random() * 300;
            var randomTop = 100 + Math.random() * 300;

            var newRect = new fabric.Rect({
                left: randomLeft,
                top: randomTop,
                width: 100,
                height: 100,
                fill: currentColor,
                stroke: 'black',
                strokewidth: 2

        });
        canvas.add(newRect);
        }

        function spawnTriangle(){
            var randomLeft = 100 + Math.random() * 300;
            var randomTop = 100 + Math.random() * 300;

            var newTriangle = new fabric.Triangle({
                left: randomLeft,
                top: randomTop,
                width: 70,
                height: 70,
                fill: currentColor,
                stroke: 'black',
                strokewidth: 2
            });
            canvas.add(newTriangle);
        }

        function saveMyScene(){
            var json  = JSON.stringify(canvas.toJSON());

            var blob = new Blob([json], {type: 'application/json'});
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "My_scene.json";
            link.click();
        }

        function loadMyScene(){
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';

            input.onchange = function(e){
                var file = e.target.files[0];
                if(!file) return;
                
                var reader = new FileReader();
                reader.onload = function(evt){
                    var data = JSON.parse(evt.target.result);
                    canvas.loadFromJSON(data, function(){
                        canvas.renderAll();
                    });
                };
                reader.readAsText(file);
            };
            input.click();
        }
    </script>
</body>
</html>
